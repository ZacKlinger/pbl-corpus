<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Research web — learning-thesis + pbl-corpus</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<script src="https://unpkg.com/layout-base@2.0.1/layout-base.js"></script>
<script src="https://unpkg.com/cose-base@2.2.0/cose-base.js"></script>
<script src="https://unpkg.com/cytoscape-cose-bilkent@4.1.0/cytoscape-cose-bilkent.js"></script>
<style>
  :root {
    --bg: #0d1017;
    --bg-elev: #161a22;
    --panel: #181c25;
    --border: #242a36;
    --border-strong: #323948;
    --text: #e6e9ef;
    --muted: #8b94a3;
    --muted-2: #5d6577;
    --accent: #7aa2f7;
    --accent-warm: #e0af68;
    --shadow: 0 4px 24px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--text); font: 14px/1.55 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; -webkit-font-smoothing: antialiased; }
  body { display: flex; flex-direction: column; }

  #corpus-tabs {
    display: flex;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
    align-items: stretch;
    flex-shrink: 0;
  }
  #corpus-tabs button {
    background: none;
    border: none;
    color: var(--muted);
    font: inherit;
    font-size: 12px;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 14px 20px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.12s, border-color 0.12s;
  }
  #corpus-tabs button:hover { color: var(--text); }
  #corpus-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
  #corpus-tabs .spacer { flex: 1; }
  #corpus-tabs .tab-note {
    font-size: 11px;
    color: var(--muted-2);
    align-self: center;
    padding-right: 4px;
    letter-spacing: 0.02em;
  }

  #view-toggle { display: flex; align-self: center; margin-right: 14px; }
  #view-toggle button {
    background: var(--bg);
    border: 1px solid var(--border-strong);
    color: var(--muted);
    font: inherit;
    font-size: 11px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 500;
    padding: 6px 12px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
    margin-bottom: 0;
    border-bottom-width: 1px;
  }
  #view-toggle button:first-child { border-radius: 4px 0 0 4px; }
  #view-toggle button:last-child { border-radius: 0 4px 4px 0; border-left-width: 0; }
  #view-toggle button:hover { color: var(--text); }
  #view-toggle button.active {
    background: var(--bg-elev);
    color: var(--accent);
    border-color: var(--accent);
  }
  #view-toggle button.active + button { border-left-color: var(--accent); }

  /* Catalog is hidden via the .view-hidden class (set on the element at
     page load); when the toggle removes that class the base display:block
     rule takes over. The previous base rule used display:none, which left
     the catalog hidden even after the class was removed. */
  #catalog {
    display: block;
    background: var(--bg);
    overflow: auto;
    padding: 0;
    position: relative;
  }
  #cy.view-hidden, #catalog.view-hidden { display: none; }

  .catalog-controls {
    padding: 14px 24px 10px;
    border-bottom: 1px solid var(--border);
    color: var(--muted-2);
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-elev);
  }
  .catalog-controls .count { color: var(--muted); }
  .catalog-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .catalog-table thead th {
    text-align: left;
    padding: 10px 14px;
    background: var(--bg-elev);
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    cursor: pointer;
    position: sticky;
    top: 0;
    z-index: 5;
    border-bottom: 1px solid var(--border-strong);
    user-select: none;
    white-space: nowrap;
  }
  .catalog-table thead th:hover { color: var(--text); }
  .catalog-table thead th.sort-asc::after  { content: " ↑"; color: var(--accent); }
  .catalog-table thead th.sort-desc::after { content: " ↓"; color: var(--accent); }
  .catalog-table tbody tr {
    cursor: pointer;
    transition: background 0.08s;
  }
  .catalog-table tbody tr:hover { background: var(--bg-elev); }
  .catalog-table tbody tr.selected { background: rgba(122,162,247,0.08); }
  .catalog-table td {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    line-height: 1.45;
  }
  .cat-title { color: var(--text); font-weight: 500; }
  .cat-subtitle { color: var(--muted); font-style: italic; font-size: 12px; margin-top: 2px; line-height: 1.35; }
  .cat-thread {
    display: inline-block;
    font-size: 10.5px;
    padding: 1px 6px;
    margin: 1px 4px 1px 0;
    border-radius: 3px;
    background: rgba(187,154,247,0.18);
    color: #c9b1f7;
    white-space: nowrap;
  }
  .type-pill {
    display: inline-block;
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    background: var(--border);
    color: var(--muted);
    white-space: nowrap;
  }
  .type-pill.type-source { background: rgba(122,162,247,0.18); color: #93b6f9; }
  .type-pill.type-thread { background: rgba(187,154,247,0.18); color: #c9b1f7; }
  .type-pill.type-lead   { background: rgba(86,95,137,0.3);   color: #8b94a3; }
  .type-pill.type-raw    { background: rgba(59,66,82,0.55);   color: #8b94a3; }
  .cat-links a {
    display: inline-block;
    color: var(--accent);
    text-decoration: none;
    margin-right: 8px;
    font-size: 13px;
    padding: 2px 4px;
    border-radius: 3px;
    transition: background 0.08s;
  }
  .cat-links a:hover { background: var(--border); }
  .catalog-empty { padding: 32px 24px; color: var(--muted-2); font-style: italic; text-align: center; }

  #app { display: grid; grid-template-columns: 260px 1fr 380px; flex: 1; min-height: 0; }
  #sidebar, #panel { background: var(--panel); overflow: auto; padding: 18px 18px 24px; }
  #sidebar { border-right: 1px solid var(--border); }
  #panel { border-left: 1px solid var(--border); }
  #cy { background: var(--bg); position: relative; }
  #cy-toolbar { position: absolute; top: 12px; right: 12px; display: flex; gap: 6px; z-index: 10; }
  #cy-toolbar button {
    background: var(--bg-elev); color: var(--muted); border: 1px solid var(--border-strong);
    padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  #cy-toolbar button:hover { background: var(--border); color: var(--text); border-color: var(--accent); }

  h1 { font-size: 13px; margin: 0 0 4px; color: var(--accent); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 600; }
  h1 + .tagline { font-size: 11px; color: var(--muted-2); margin: 0 0 18px; }
  h2 { font-size: 11px; margin: 20px 0 8px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; font-weight: 600; }

  #search-wrap { position: relative; margin-bottom: 6px; }
  #search { width: 100%; padding: 8px 10px 8px 30px; background: var(--bg); color: var(--text); border: 1px solid var(--border-strong); border-radius: 6px; font-size: 13px; outline: none; transition: border-color 0.12s; }
  #search:focus { border-color: var(--accent); }
  #search::placeholder { color: var(--muted-2); }
  #search-wrap::before { content: "⌕"; position: absolute; left: 10px; top: 7px; color: var(--muted-2); font-size: 14px; }
  .kbd { font: 11px/1 ui-monospace, SFMono-Regular, monospace; color: var(--muted-2); background: var(--bg); border: 1px solid var(--border-strong); padding: 1px 5px; border-radius: 3px; }
  #search-hint { font-size: 11px; color: var(--muted-2); margin: 4px 0 0; }

  .filter-row, .legend-row { display: flex; align-items: center; gap: 8px; margin: 2px 0; cursor: pointer; user-select: none; padding: 2px 4px; border-radius: 4px; transition: background 0.1s; }
  .filter-row:hover { background: var(--bg); }
  .filter-row input { margin: 0; cursor: pointer; }
  .filter-row label { font-size: 12px; cursor: pointer; flex: 1; color: var(--text); }
  .swatch { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; border: 1px solid var(--border); }

  #stats { color: var(--muted-2); font-size: 11px; margin-top: 22px; padding-top: 14px; border-top: 1px solid var(--border); line-height: 1.6; }

  #panel .empty { color: var(--muted-2); font-style: italic; }
  #panel .type-tag { display: inline-block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--accent-warm); margin-bottom: 4px; font-weight: 600; }
  #panel h3 { margin: 0 0 6px; font-size: 17px; line-height: 1.3; color: var(--text); }
  #panel .subtitle { color: var(--muted); font-size: 13px; margin: 0 0 14px; line-height: 1.45; font-style: italic; }
  #panel .meta-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
  #panel .badge { display: inline-block; padding: 2px 7px; border-radius: 4px; font-size: 11px; background: var(--border); color: var(--muted); }
  #panel .badge.layer-empirical    { background: rgba(122,162,247,0.18); color: #93b6f9; }
  #panel .badge.layer-visionary    { background: rgba(158,206,106,0.18); color: #b1d97e; }
  #panel .badge.layer-practitioner { background: rgba(247,118,142,0.18); color: #f59aac; }
  #panel .badge.layer-historical   { background: rgba(125,207,255,0.18); color: #97d8ff; }
  #panel .excerpt { color: var(--muted); font-size: 13px; line-height: 1.55; margin-bottom: 14px; padding-left: 10px; border-left: 2px solid var(--border); }
  #panel .quotes { margin-bottom: 14px; }
  #panel .quote { font-size: 12.5px; line-height: 1.5; color: var(--text); margin: 0 0 10px; padding: 8px 12px; background: var(--bg); border-left: 2px solid var(--accent); border-radius: 0 4px 4px 0; }
  #panel .link-out { display: inline-block; color: var(--accent); text-decoration: none; font-size: 12px; padding: 4px 0; }
  #panel .link-out:hover { text-decoration: underline; }
  #panel h2 { margin-top: 18px; }
  #panel ul { list-style: none; padding: 0; margin: 0; }
  #panel li { margin: 3px 0; padding: 4px 6px; border-radius: 4px; transition: background 0.1s; cursor: pointer; }
  #panel li:hover { background: var(--bg); }
  #panel li a { color: var(--text); text-decoration: none; cursor: pointer; }
  #panel li:hover a { color: var(--accent); }
  .edge-badge { display: inline-block; padding: 1px 6px; border-radius: 3px; font-size: 10px; margin-right: 6px; font-weight: 500; letter-spacing: 0.02em; }
  .edge-badge.supports    { background: rgba(158,206,106,0.22); color: #b1d97e; }
  .edge-badge.counters    { background: rgba(247,118,142,0.22); color: #f59aac; }
  .edge-badge.frames      { background: rgba(187,154,247,0.22); color: #c9b1f7; }
  .edge-badge.anchors     { background: rgba(224,175,104,0.22); color: #ecc28c; }
  .edge-badge.relates-to  { background: rgba(125,207,255,0.22); color: #97d8ff; }
  .edge-badge.tracked-in  { background: rgba(86,95,137,0.30); color: #8b94a3; }

  #hover-tip {
    position: absolute; pointer-events: none; background: var(--bg-elev); border: 1px solid var(--border-strong);
    padding: 5px 9px; border-radius: 4px; font-size: 11px; color: var(--text);
    box-shadow: var(--shadow); z-index: 20; display: none; max-width: 260px; line-height: 1.4;
  }
</style>
</head>
<body>

<div id="corpus-tabs">
  <button data-corpus="learning-thesis">Learning thesis</button>
  <button data-corpus="pbl-corpus">PBL corpus</button>
  <span class="spacer"></span>
  <div id="view-toggle">
    <button data-view="graph" class="active">Graph</button>
    <button data-view="catalog">Catalog</button>
  </div>
  <span class="tab-note">Two compatible corpora · shared protocol</span>
</div>

<div id="app">

  <div id="sidebar">
    <h1>Research web</h1>
    <p class="tagline">Loading…</p>

    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search nodes…" autocomplete="off">
    </div>
    <p id="search-hint"><span class="kbd">/</span> focus · <span class="kbd">Esc</span> clear · <span class="kbd">F</span> fit</p>

    <h2>Layers</h2>
    <div id="layer-filters"></div>

    <h2>Threads</h2>
    <div id="thread-filters"></div>

    <h2>Edge kinds</h2>
    <div id="edge-legend"></div>

    <div id="stats"></div>
  </div>

  <div id="cy">
    <div id="cy-toolbar">
      <button id="btn-fit" title="Fit to view (F)">⤢ Fit</button>
      <button id="btn-reset" title="Re-layout">↺ Re-layout</button>
    </div>
    <div id="hover-tip"></div>
  </div>

  <div id="catalog" class="view-hidden"></div>

  <div id="panel">
    <p class="empty">Click a node for details. Hover for a peek.</p>
  </div>

</div>

<script>
// --- Per-repo config -----------------------------------------------------
// LOCAL_CORPUS is the corpus this page is deployed for. The matching tab is
// active on load, and its graph.json is fetched same-origin (faster, no CORS).
// The sibling corpus's graph.json is fetched cross-origin from its Pages URL.
const LOCAL_CORPUS = "pbl-corpus";  // set per repo; sibling page is fetched cross-origin from its Pages URL

const CORPORA = {
  "learning-thesis": {
    label: "Learning thesis",
    pageUrl: "https://zacklinger.github.io/learning-thesis/",
    githubBase: "https://github.com/ZacKlinger/learning-thesis/blob/main/",
  },
  "pbl-corpus": {
    label: "PBL corpus",
    pageUrl: "https://zacklinger.github.io/pbl-corpus/",
    githubBase: "https://github.com/ZacKlinger/pbl-corpus/blob/main/",
  },
};

function graphUrlFor(corpus) {
  return corpus === LOCAL_CORPUS ? "graph.json" : CORPORA[corpus].pageUrl + "graph.json";
}

// --- Style constants ----------------------------------------------------
const LAYER_COLOR = {
  thesis:      "#e0af68",
  thread:      "#bb9af7",
  empirical:   "#7aa2f7",
  visionary:   "#9ece6a",
  practitioner:"#f7768e",
  historical:  "#7dcfff",
  lead:        "#565f89",
  raw:         "#3b4252",
  "?":         "#565f89",
};

const LAYER_LABEL = {
  thread:       "Strand",
  empirical:    "Empirical",
  visionary:    "Visionary",
  practitioner: "Practitioner",
  historical:   "Historical",
  lead:         "Lead",
  raw:          "Raw file",
};

const EDGE_KIND_COLOR = {
  anchors:    "#e0af68",
  supports:   "#9ece6a",
  counters:   "#f7768e",
  frames:     "#bb9af7",
  "tracked-in": "#565f89",
  "relates-to": "#7dcfff",
};

// --- Module state (mutated by loadCorpus) -------------------------------
let cy = null;
let graph = null;
let currentCorpus = null;
let currentGithubBase = "";
const state = { activeLayers: new Set(), activeThreads: new Set(), selectedId: null };

// Catalog mode state (set by view toggle and the column-header sort UI)
let currentView = "graph";
const catalogSort = { key: "label", dir: 1 };
// Forward-references to the per-corpus closures inside loadCorpus, so the
// catalog row-click handler can select a node + render the panel even
// though those functions are defined inside loadCorpus's scope.
let renderPanelImpl = null;
let selectNodeImpl = null;

// --- Helpers ------------------------------------------------------------
function sizeFor(d) {
  const base = d.type === "seed" ? 28
             : d.type === "thread" ? 24
             : 16;
  const deg = d.degree || 0;
  return base + Math.sqrt(deg) * 7;
}

function escapeHTML(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

// --- Corpus load --------------------------------------------------------
async function loadCorpus(corpus) {
  currentCorpus = corpus;
  const config = CORPORA[corpus];
  currentGithubBase = config.githubBase;

  // Tab state
  document.querySelectorAll("#corpus-tabs button").forEach(b =>
    b.classList.toggle("active", b.dataset.corpus === corpus));

  // Reset module state
  state.activeLayers.clear();
  state.activeThreads.clear();
  state.selectedId = null;

  // Teardown previous instance
  if (cy) { cy.destroy(); cy = null; }
  document.getElementById("search").value = "";
  document.getElementById("panel").innerHTML = '<p class="empty">Loading…</p>';
  document.querySelector(".tagline").textContent = "Loading…";
  document.getElementById("layer-filters").innerHTML = "";
  document.getElementById("thread-filters").innerHTML = "";
  document.getElementById("edge-legend").innerHTML = "";
  document.getElementById("stats").innerHTML = "";

  // Fetch
  try {
    const url = graphUrlFor(corpus) + "?cb=" + Date.now();
    const r = await fetch(url, { cache: "no-store" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    graph = await r.json();
  } catch (e) {
    document.querySelector(".tagline").textContent = `${config.label} · unavailable`;
    document.getElementById("panel").innerHTML =
      `<p class="empty">Couldn't load <strong>${escapeHTML(config.label)}</strong>: ${escapeHTML(e.message)}. ` +
      `The sibling corpus may not have been deployed yet — try ` +
      `<a class="link-out" href="${config.pageUrl}" target="_blank">${escapeHTML(config.pageUrl)}</a>.</p>`;
    return;
  }

  document.querySelector(".tagline").textContent =
    `${config.label} · ${graph.nodes.length} nodes · ${graph.edges.length} edges`;

  // Pre-compute degree (count of edges touching each node).
  const degree = {};
  graph.edges.forEach(e => {
    degree[e.source] = (degree[e.source] || 0) + 1;
    degree[e.target] = (degree[e.target] || 0) + 1;
  });

  const elements = [
    ...graph.nodes.map(n => ({ data: { ...n, degree: degree[n.id] || 0 } })),
    ...graph.edges.map(e => ({ data: { ...e, id: `${e.source}->${e.target}:${e.kind}` } })),
  ];

  cy = cytoscape({
    container: document.getElementById("cy"),
    elements,
    style: [
      { selector: "node", style: {
        "background-color": ele => LAYER_COLOR[ele.data("layer")] || "#888",
        label: "data(label)",
        color: "#d8dde6",
        "font-size": 11,
        "text-valign": "bottom",
        "text-margin-y": 7,
        "text-outline-color": "#0d1017",
        "text-outline-width": 3,
        width:  ele => sizeFor(ele.data()),
        height: ele => sizeFor(ele.data()),
        "border-width": 2,
        "border-color": "#0d1017",
        "transition-property": "background-color, border-color, border-width, width, height, opacity",
        "transition-duration": "150ms",
      }},
      { selector: "node[type='seed']",   style: { shape: "diamond" } },
      { selector: "node[type='thread']", style: { shape: "round-rectangle" } },
      { selector: "node[type='lead']",   style: { shape: "triangle", "border-style": "dashed", "border-color": "#5d6577" } },
      { selector: "node[type='raw']",    style: { shape: "tag", opacity: 0.55 } },
      { selector: "node:selected", style: {
        "border-color": "#e0af68",
        "border-width": 3,
        width:  ele => sizeFor(ele.data()) + 6,
        height: ele => sizeFor(ele.data()) + 6,
      }},
      { selector: "node.hover", style: { "border-color": "#7aa2f7", "border-width": 3 } },
      { selector: "edge", style: {
        width: 1.6,
        "line-color": ele => EDGE_KIND_COLOR[ele.data("kind")] || "#444",
        "target-arrow-color": ele => EDGE_KIND_COLOR[ele.data("kind")] || "#444",
        "target-arrow-shape": "triangle",
        "arrow-scale": 0.9,
        "curve-style": "bezier",
        opacity: 0.7,
        "transition-property": "opacity, width",
        "transition-duration": "150ms",
      }},
      { selector: "edge[kind='counters']", style: { "line-style": "dashed" } },
      { selector: "edge.highlight", style: { width: 3, opacity: 1 } },
      { selector: ".dimmed", style: { opacity: 0.08 } },
      { selector: ".search-hit", style: { "border-color": "#e0af68", "border-width": 3 } },
    ],
    layout: {
      name: "cose-bilkent",
      animate: "end",
      animationDuration: 600,
      nodeRepulsion: 9000,
      idealEdgeLength: 120,
      edgeElasticity: 0.45,
      gravity: 0.3,
      padding: 40,
      randomize: false,
    },
    wheelSensitivity: 0.22,
    minZoom: 0.2,
    maxZoom: 3,
  });

  const panel = document.getElementById("panel");

  function renderPanel(node) {
    if (!node) {
      panel.innerHTML = '<p class="empty">Click a node for details. Hover for a peek.</p>';
      return;
    }
    const d = node.data();
    const neighborhood = node.openNeighborhood();
    const incoming = neighborhood.edges().filter(e => e.target().id() === node.id());
    const outgoing = neighborhood.edges().filter(e => e.source().id() === node.id());

    const renderList = (edges, dir) => {
      if (edges.length === 0) return "";
      const items = edges.map(e => {
        const other = dir === "in" ? e.source() : e.target();
        return `<li><a data-id="${other.id()}"><span class="edge-badge ${e.data("kind")}">${e.data("kind")}</span>${escapeHTML(other.data("label"))}</a></li>`;
      }).join("");
      return `<h2>${dir === "in" ? "Pointed to by" : "Points to"} (${edges.length})</h2><ul>${items}</ul>`;
    };

    const githubLink = d.path ? `<a class="link-out" href="${currentGithubBase}${d.path}" target="_blank">View ${d.path} ↗</a>` : "";

    const quotesBlock = d.quotes && d.quotes.length ? `
      <h2>Verbatim (${d.quotes.length})</h2>
      <div class="quotes">${d.quotes.map(q => `<div class="quote">${escapeHTML(q)}</div>`).join("")}</div>
    ` : "";

    const excerptBlock = d.thesis_excerpt
      ? `<div class="excerpt">${escapeHTML(d.thesis_excerpt)}</div>` : "";

    const framingBlock = d.seed_framing
      ? `<h2>Framing</h2><div class="excerpt">${escapeHTML(d.seed_framing)}</div>` : "";
    const claimsBlock = (d.type === "thread" && typeof d.claims === "number")
      ? `<span class="badge" title="Claim headings in this thread">${d.claims} claim${d.claims === 1 ? "" : "s"}</span>` : "";

    panel.innerHTML = `
      <div class="type-tag">${LAYER_LABEL[d.layer] || d.type}</div>
      <h3>${escapeHTML(d.label)}</h3>
      ${d.title ? `<p class="subtitle">${escapeHTML(d.title)}</p>` : ""}
      <div class="meta-row">
        ${d.year ? `<span class="badge">${d.year}</span>` : ""}
        ${d.read_status ? `<span class="badge">${d.read_status}</span>` : ""}
        ${d.layer && d.layer !== d.type ? `<span class="badge layer-${d.layer}">${d.layer}</span>` : ""}
        ${d.degree ? `<span class="badge" title="Edges touching this node">${d.degree} edge${d.degree === 1 ? "" : "s"}</span>` : ""}
        ${claimsBlock}
      </div>
      ${framingBlock}
      ${excerptBlock}
      ${quotesBlock}
      ${githubLink}
      ${renderList(outgoing.toArray(), "out")}
      ${renderList(incoming.toArray(), "in")}
    `;

    panel.querySelectorAll("a[data-id]").forEach(a => {
      a.addEventListener("click", ev => {
        ev.preventDefault();
        const target = cy.getElementById(ev.currentTarget.getAttribute("data-id"));
        if (target.length) selectNode(target);
      });
    });
  }

  function selectNode(node) {
    cy.elements().unselect().removeClass("highlight");
    node.select();
    node.connectedEdges().addClass("highlight");
    state.selectedId = node.id();
    renderPanel(node);
    cy.animate({ center: { eles: node }, duration: 250, easing: "ease-out" });
    if (currentView === "catalog") renderCatalog();
  }

  // Expose to module scope so the catalog view can drive selection.
  renderPanelImpl = renderPanel;
  selectNodeImpl = selectNode;

  // Reset panel on fresh load
  renderPanel(null);

  // Hover preview
  const tip = document.getElementById("hover-tip");
  const cyContainer = document.getElementById("cy");
  cy.on("mouseover", "node", evt => {
    const n = evt.target;
    n.addClass("hover");
    n.connectedEdges().addClass("highlight");
    const d = n.data();
    const tail = d.degree ? ` · ${d.degree} edge${d.degree === 1 ? "" : "s"}` : "";
    tip.textContent = (d.title || d.label) + (d.year ? ` (${d.year})` : "") + tail;
    tip.style.display = "block";
  });
  cy.on("mousemove", evt => {
    const e = evt.originalEvent;
    if (!e) return;
    const rect = cyContainer.getBoundingClientRect();
    tip.style.left = (e.clientX - rect.left + 14) + "px";
    tip.style.top  = (e.clientY - rect.top + 14) + "px";
  });
  cy.on("mouseout", "node", evt => {
    evt.target.removeClass("hover");
    evt.target.connectedEdges().removeClass("highlight");
    tip.style.display = "none";
    if (state.selectedId) {
      const sel = cy.getElementById(state.selectedId);
      if (sel.length) sel.connectedEdges().addClass("highlight");
    }
  });

  cy.on("tap", "node", evt => selectNode(evt.target));
  cy.on("tap", evt => {
    if (evt.target === cy) {
      cy.elements().unselect().removeClass("highlight");
      state.selectedId = null;
      renderPanel(null);
    }
  });

  // Filters
  const layersInUse = [...new Set(graph.nodes.map(n => n.layer))].sort();
  state.activeLayers = new Set(layersInUse);
  document.getElementById("layer-filters").innerHTML = layersInUse.map(l => `
    <div class="filter-row">
      <input type="checkbox" class="layer-toggle" id="layer-${l}" data-layer="${l}" checked>
      <div class="swatch" style="background:${LAYER_COLOR[l] || "#888"}"></div>
      <label for="layer-${l}">${LAYER_LABEL[l] || l}</label>
    </div>`).join("");

  const threads = graph.nodes.filter(n => n.type === "thread");
  state.activeThreads = new Set(threads.map(t => t.id));
  document.getElementById("thread-filters").innerHTML = threads.map(t => `
    <div class="filter-row">
      <input type="checkbox" class="thread-toggle" id="${t.id}" data-id="${t.id}" checked>
      <label for="${t.id}">${escapeHTML(t.label)}</label>
    </div>`).join("");

  const edgeKindsInUse = [...new Set(graph.edges.map(e => e.kind))].sort();
  document.getElementById("edge-legend").innerHTML = edgeKindsInUse.map(k => `
    <div class="legend-row">
      <div class="swatch" style="background:${EDGE_KIND_COLOR[k] || "#888"}"></div>
      <span style="font-size:12px;color:var(--muted)">${k}</span>
    </div>`).join("");

  document.querySelectorAll(".layer-toggle").forEach(el =>
    el.addEventListener("change", () => {
      state.activeLayers = new Set(
        [...document.querySelectorAll(".layer-toggle:checked")].map(el => el.dataset.layer));
      applyFilters();
      renderCatalog();
    }));
  document.querySelectorAll(".thread-toggle").forEach(el =>
    el.addEventListener("change", () => {
      state.activeThreads = new Set(
        [...document.querySelectorAll(".thread-toggle:checked")].map(el => el.dataset.id));
      applyFilters();
      renderCatalog();
    }));

  function applyFilters() {
    cy.elements().removeClass("dimmed");
    cy.nodes().forEach(n => {
      if (!state.activeLayers.has(n.data("layer"))) {
        n.addClass("dimmed");
        return;
      }
      if (n.data("type") === "thread" && !state.activeThreads.has(n.id())) {
        n.addClass("dimmed");
        return;
      }
      if (n.data("type") === "seed") {
        const tid = n.id().replace("seed:", "thread:");
        if (!state.activeThreads.has(tid)) n.addClass("dimmed");
        return;
      }
      const connectedThreads = n.connectedEdges().connectedNodes().filter(m => m.data("type") === "thread");
      if (connectedThreads.length > 0) {
        const anyActive = connectedThreads.some(m => state.activeThreads.has(m.id()));
        if (!anyActive) n.addClass("dimmed");
      }
    });
    cy.edges().forEach(e => {
      if (e.source().hasClass("dimmed") || e.target().hasClass("dimmed")) e.addClass("dimmed");
    });
  }

  document.getElementById("stats").innerHTML = `Generated ${graph.generated_at || "—"}`;

  // Build the catalog view from the same data, so a tab switch is instant.
  renderCatalog();
}

// --- Catalog view -----------------------------------------------------------
function renderCatalog() {
  const cat = document.getElementById("catalog");
  if (!graph || !graph.nodes) {
    cat.innerHTML = '<div class="catalog-empty">No data loaded.</div>';
    return;
  }
  const q = document.getElementById("search").value.trim().toLowerCase();

  const rows = graph.nodes
    .filter(n => state.activeLayers.size === 0 || state.activeLayers.has(n.layer))
    .filter(n => {
      // Thread filter: a thread row is shown only if it is itself active.
      // A source row is shown if it cites at least one active thread (or no threads).
      // Lead and raw rows are not gated by thread filter.
      if (n.type === "thread") return state.activeThreads.has(n.id);
      if (n.type === "source" && n.threads && n.threads.length) {
        return n.threads.some(t => state.activeThreads.has("thread:" + t));
      }
      return true;
    })
    .filter(n => {
      if (!q) return true;
      const hay = [
        n.label, n.title, n.thesis_excerpt,
        (n.threads || []).join(" "),
        (n.quotes || []).join(" "),
      ].filter(Boolean).join(" ").toLowerCase();
      return hay.includes(q);
    });

  // Sort
  const typeRank = { thread: 0, source: 1, lead: 2, raw: 3 };
  rows.sort((a, b) => {
    const key = catalogSort.key;
    const va = key === "type" ? (typeRank[a.type] ?? 99) : (a[key] ?? "");
    const vb = key === "type" ? (typeRank[b.type] ?? 99) : (b[key] ?? "");
    const cmp = String(va).localeCompare(String(vb), undefined, { numeric: true, sensitivity: "base" });
    return catalogSort.dir * cmp;
  });

  const headers = [
    { key: "type",        label: "Type"    },
    { key: "layer",       label: "Layer"   },
    { key: "label",       label: "Title"   },
    { key: "year",        label: "Year"    },
    { key: "read_status", label: "Status"  },
    { key: null,          label: "Threads" },
    { key: null,          label: "Links"   },
  ];
  const headHtml = "<tr>" + headers.map(h => {
    let cls = "";
    if (h.key && h.key === catalogSort.key) cls = catalogSort.dir > 0 ? "sort-asc" : "sort-desc";
    return `<th${h.key ? ` data-sort="${h.key}"` : ""}${cls ? ` class="${cls}"` : ""}>${h.label}</th>`;
  }).join("") + "</tr>";

  if (rows.length === 0) {
    cat.innerHTML = `
      <div class="catalog-controls"><span class="count">No entries match the current filters / search.</span></div>
    `;
    return;
  }

  const bodyHtml = rows.map(n => {
    const threadsCell = (n.threads || []).map(t =>
      `<span class="cat-thread">${escapeHTML(t)}</span>`
    ).join("");
    const links = [];
    if (n.path)     links.push(`<a href="${currentGithubBase}${n.path}" target="_blank" title="Open note on GitHub">note</a>`);
    if (n.raw_path) links.push(`<a href="${currentGithubBase}${n.raw_path}" target="_blank" title="Open raw file on GitHub">raw</a>`);
    if (n.url)      links.push(`<a href="${escapeHTML(n.url)}" target="_blank" title="Open original source URL">orig ↗</a>`);
    const layerBadge = (n.layer && n.layer !== n.type)
      ? `<span class="badge layer-${n.layer}">${LAYER_LABEL[n.layer] || n.layer}</span>`
      : "";
    const selectedCls = state.selectedId === n.id ? ' class="selected"' : "";
    return `<tr data-id="${n.id}"${selectedCls}>
      <td><span class="type-pill type-${n.type}">${n.type}</span></td>
      <td>${layerBadge}</td>
      <td>
        <div class="cat-title">${escapeHTML(n.label || "")}</div>
        ${n.title ? `<div class="cat-subtitle">${escapeHTML(n.title)}</div>` : ""}
      </td>
      <td>${escapeHTML(n.year || "")}</td>
      <td>${escapeHTML(n.read_status || "")}</td>
      <td>${threadsCell}</td>
      <td class="cat-links">${links.join("")}</td>
    </tr>`;
  }).join("");

  cat.innerHTML = `
    <div class="catalog-controls">
      <span class="count">${rows.length} of ${graph.nodes.length} entries</span>
      <span>· click a column header to sort · click a row for detail in side panel</span>
    </div>
    <table class="catalog-table">
      <thead>${headHtml}</thead>
      <tbody>${bodyHtml}</tbody>
    </table>
  `;

  cat.querySelectorAll("th[data-sort]").forEach(th => {
    th.addEventListener("click", () => {
      const k = th.getAttribute("data-sort");
      if (catalogSort.key === k) catalogSort.dir *= -1;
      else { catalogSort.key = k; catalogSort.dir = 1; }
      renderCatalog();
    });
  });

  cat.querySelectorAll("tr[data-id]").forEach(tr => {
    tr.addEventListener("click", ev => {
      if (ev.target.tagName === "A" || ev.target.closest("a")) return;
      const id = tr.getAttribute("data-id");
      if (cy && selectNodeImpl) {
        const node = cy.getElementById(id);
        if (node.length) selectNodeImpl(node);
      }
    });
  });
}

// --- Search (operates on whatever cy is current) ----------------------------
function runSearch() {
  // Catalog filters from the search input directly each render, so this only
  // needs to do the cytoscape side of the work.
  if (currentView === "catalog") {
    renderCatalog();
    return;
  }
  if (!cy) return;
  const q = document.getElementById("search").value.trim().toLowerCase();
  cy.nodes().removeClass("search-hit");
  if (!q) return;
  const matches = cy.nodes().filter(n => {
    const d = n.data();
    const hay = ((d.label || "") + " " + (d.title || "") + " " + (d.thesis_excerpt || "")).toLowerCase();
    return hay.includes(q);
  });
  matches.addClass("search-hit");
  if (matches.length === 1) {
    matches[0].select();
    cy.animate({ center: { eles: matches[0] }, duration: 250, easing: "ease-out" });
  } else if (matches.length > 1) {
    cy.fit(matches, 80);
  }
}

// Switch between Graph and Catalog without re-fetching graph.json.
function setView(v) {
  if (v === currentView) return;
  currentView = v;
  document.querySelectorAll("#view-toggle button").forEach(b =>
    b.classList.toggle("active", b.dataset.view === v));
  document.getElementById("cy").classList.toggle("view-hidden", v !== "graph");
  document.getElementById("catalog").classList.toggle("view-hidden", v !== "catalog");
  if (v === "catalog") renderCatalog();
  else if (v === "graph" && cy) cy.resize();
}

// --- One-time global handlers ----------------------------------------------
document.querySelectorAll("#corpus-tabs button[data-corpus]").forEach(btn => {
  btn.addEventListener("click", () => {
    if (btn.dataset.corpus !== currentCorpus) loadCorpus(btn.dataset.corpus);
  });
});

document.querySelectorAll("#view-toggle button").forEach(btn => {
  btn.addEventListener("click", () => setView(btn.dataset.view));
});

document.getElementById("search").addEventListener("input", runSearch);

document.getElementById("btn-fit").addEventListener("click", () => { if (cy) cy.fit(undefined, 50); });
document.getElementById("btn-reset").addEventListener("click", () => {
  if (!cy) return;
  cy.layout({
    name: "cose-bilkent", animate: true, animationDuration: 600, randomize: true,
    nodeRepulsion: 9000, idealEdgeLength: 120, edgeElasticity: 0.45, gravity: 0.3, padding: 40,
  }).run();
});

document.addEventListener("keydown", e => {
  const search = document.getElementById("search");
  if (e.target === search) {
    if (e.key === "Escape") { search.value = ""; runSearch(); search.blur(); }
    return;
  }
  if (e.key === "/") { e.preventDefault(); search.focus(); search.select(); }
  else if (e.key === "Escape" && cy) {
    cy.elements().unselect().removeClass("highlight");
    state.selectedId = null;
    document.getElementById("panel").innerHTML = '<p class="empty">Click a node for details. Hover for a peek.</p>';
  }
  else if ((e.key === "f" || e.key === "F") && cy) cy.fit(undefined, 50);
});

// --- Boot -------------------------------------------------------------------
loadCorpus(LOCAL_CORPUS);
</script>
